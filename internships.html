<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Internships | Daddy Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Daddy Media</a>
            <nav class="nav-links">
                <a href="jobs.html">Jobs</a>
                <a href="internships.html" class="active">Internships</a>
                <a href="community.html">Community</a>
            </nav>
            <div class="auth-buttons" id="auth-container"></div>
        </div>
    </header>

    <main class="directory-layout container">
        <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-group">
                <label>Duration</label>
                <select id="filter-duration">
                    <option value="all">Any Duration</option>
                    <option value="1-3">1-3 Months</option>
                    <option value="3-6">3-6 Months</option>
                    <option value="6+">6+ Months</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Stipend</label>
                <select id="filter-stipend">
                    <option value="all">All</option>
                    <option value="paid">Paid</option>
                    <option value="unpaid">Unpaid</option>
                </select>
            </div>
            <button class="btn btn-primary w-100" id="apply-filters">Apply Filters</button>
        </aside>

        <section class="listings">
            <div class="listings-header">
                <h1>Explore Internships</h1>
                <span id="results-count">Loading...</span>
            </div>
            <div class="jobs-list" id="internships-list-container">
                <div class="loader">Fetching internships...</div>
            </div>
            <div class="pagination" id="pagination-controls">
                <button class="btn btn-outline" id="prev-page" disabled>Previous</button>
                <button class="btn btn-outline" id="next-page">Next</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Daddy Media. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/internships.js"></script>
</body>
</html>
