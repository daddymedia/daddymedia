<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Internships | Daddy Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Daddy Media</a>
            <nav class="nav-links">
                <a href="jobs.html">Jobs</a>
                <a href="internships.html" class="active">Internships</a>
                <a href="community.html">Community</a>
            </nav>
            <div class="auth-buttons" id="auth-container"></div>
        </div>
    </header>

    <main class="directory-layout container">
        <aside class="filters">
            <h3>Compensation Filters</h3>
            <div class="filter-group">
                <label for="filter-stipend">Stipend Status</label>
                <select id="filter-stipend">
                    <option value="all">All Structures</option>
                    <option value="paid">Paid Tracks</option>
                    <option value="unpaid">Unpaid / Credit Tracks</option>
                </select>
            </div>
            <button class="btn btn-primary w-100" id="filter-internship-btn">Re-Index Nodes</button>
        </aside>

        <section class="listings">
            <div class="listings-header">
                <h1>Available Apprenticeships & Internships</h1>
            </div>
            <div class="jobs-list" id="internships-stream-target">
                <p class="text-muted">Resolving standard internship documentation records...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3w0R0qx8IA2MeAZETBxKBP02IqIVz8",
            authDomain: "daddy-media.firebaseapp.com",
            projectId: "daddy-media",
            storageBucket: "daddy-media.firebasestorage.app",
            messagingSenderId: "13022563374",
            appId: "1:13022563374:web:1123e9bec9d49d192823bf",
            measurementId: "G-LWX8MJ7SW5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserReference = null;

        onAuthStateChanged(auth, (user) => {
            currentUserReference = user;
            document.getElementById('auth-container').innerHTML = user ? 
                `<a href="profile.html" class="btn btn-outline">Profile Board</a>` : 
                `<a href="index.html" class="btn btn-primary">Authenticate</a>`;
            renderInternshipMatrix();
        });

        async function renderInternshipMatrix(stipendFilter = 'all') {
            const target = document.getElementById('internships-stream-target');
            try {
                let ref = collection(db, "internships");
                if(stipendFilter !== 'all') {
                    ref = query(collection(db, "internships"), where("stipend", "==", stipendFilter));
                }
                const snap = await getDocs(ref);
                if(snap.empty) {
                    target.innerHTML = '<p class="text-muted">Zero internship profiles match the specified execution query matrix.</p>';
                    return;
                }
                target.innerHTML = '';
                snap.forEach((node) => {
                    const data = node.data();
                    const id = node.id;
                    const card = document.createElement('div');
                    card.className = 'card mt-2';
                    card.innerHTML = `
                        <h3>${data.title}</h3>
                        <p class="text-muted"><strong>${data.company}</strong></p>
                        <p>Expected Duration Model: ${data.duration}</p>
                        <p>Classification Category: ${data.stipend === 'paid' ? 'Compensated' : 'Uncompensated'}</p>
                        <div class="mt-2" id="int-action-${id}"></div>
                    `;
                    target.appendChild(card);

                    const act = document.getElementById(`int-action-${id}`);
                    if(currentUserReference) {
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-primary';
                        btn.innerText = 'Lock Direct Intent';
                        btn.addEventListener('click', async () => {
                            await addDoc(collection(db, "applications"), {
                                applicantId: currentUserReference.uid,
                                jobId: id,
                                position: data.title,
                                company: data.company,
                                status: "Awaiting Admin Processing",
                                timestamp: new Date()
                            });
                            alert('Ecosystem operational registry saved.');
                        });
                        act.appendChild(btn);
                    } else {
                        act.innerHTML = '<span class="text-muted">Access tokens missing. Sign-in required.</span>';
                    }
                });
            } catch(e) {
                target.innerHTML = `<p class="text-danger">Internal error mapping arrays: ${e.message}</p>`;
            }
        }

        document.getElementById('filter-internship-btn').addEventListener('click', () => {
            renderInternshipMatrix(document.getElementById('filter-stipend').value);
        });
    </script>
</body>
</html>
