<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daddy Media | Jobs, Internships & Community</title>
    <meta name="description" content="Discover jobs, internships, communities, career resources, and networking opportunities.">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN for instant styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#2563eb', secondary: '#1e40af' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <!-- Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-gray-900 hover:text-primary transition">
                    <img src="DaddyMediaLogo.png" alt="Daddy Media Logo" class="h-8 w-8 object-cover rounded" onerror="this.style.display='none'">
                    Daddy Media
                </a>
                
                <nav class="hidden md:flex space-x-8">
                    <a href="jobs.html" class="text-gray-600 hover:text-primary font-medium transition">Jobs</a>
                    <a href="internships.html" class="text-gray-600 hover:text-primary font-medium transition">Internships</a>
                    <a href="community.html" class="text-gray-600 hover:text-primary font-medium transition">Community</a>
                </nav>

                <div id="auth-container" class="flex items-center gap-4">
                    <button id="auth-toggle-btn" class="text-sm font-medium text-gray-700 hover:text-primary transition">Sign Up</button>
                    <button id="google-login-btn" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-md text-sm font-medium transition shadow-sm flex items-center gap-2">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4"> Google
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Auth Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-xl">
            <h2 id="auth-title" class="text-xl font-bold mb-4">Login</h2>
            <input type="email" id="email-in" placeholder="Email" class="w-full mb-3 p-2 border rounded">
            <input type="password" id="pass-in" placeholder="Password" class="w-full mb-4 p-2 border rounded">
            <button id="submit-auth-btn" class="w-full bg-primary text-white py-2 rounded-lg font-medium">Continue</button>
            <button onclick="document.getElementById('auth-modal').classList.add('hidden')" class="w-full mt-2 text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-primary to-indigo-700 py-20 text-white overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">Launch Your Career with Daddy Media</h1>
            <p class="text-lg md:text-xl text-blue-100 mb-8 max-w-2xl mx-auto">Discover high-quality jobs, specialized internships, and connect with a thriving network of professionals and peers.</p>
            
            <div class="max-w-3xl mx-auto bg-white rounded-full p-1.5 sm:p-2 flex shadow-lg w-full">
                <input type="text" id="global-search" placeholder="Search jobs, skills, or companies..." 
                       class="flex-grow px-3 sm:px-4 py-2 focus:outline-none text-gray-900 placeholder-gray-400 bg-transparent min-w-0 text-sm sm:text-base">
                <button id="hero-search-btn" class="bg-primary hover:bg-secondary text-white px-5 py-2 sm:px-8 sm:py-3 rounded-full font-medium transition duration-200 ease-in-out flex-shrink-0 text-sm sm:text-base">
                    Search
                </button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <section class="mb-16">
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Featured Job Opportunities</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="featured-jobs-container"></div>
        </section>
        <section>
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Featured Internships</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="featured-internships-container"></div>
        </section>
    </main>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3w0R0qx8IA2MeAZETBxKBP02IqIVz8",
            authDomain: "daddy-media.firebaseapp.com",
            projectId: "daddy-media",
            storageBucket: "daddy-media.firebasestorage.app",
            messagingSenderId: "13022563374",
            appId: "1:13022563374:web:1123e9bec9d49d192823bf",
            measurementId: "G-LWX8MJ7SW5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let isSignUp = false;

        // Auth Logic
        document.getElementById('auth-toggle-btn').addEventListener('click', () => {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? "Create Account" : "Login";
            document.getElementById('auth-modal').classList.remove('hidden');
        });

        document.getElementById('submit-auth-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-in').value;
            const pass = document.getElementById('pass-in').value;
            try {
                if (isSignUp) await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('auth-modal').classList.add('hidden');
            } catch (e) { alert("Error: " + e.message); }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => signInWithPopup(auth, provider));

        onAuthStateChanged(auth, (user) => {
            const container = document.getElementById('auth-container');
            if (user) {
                container.innerHTML = `<a href="profile.html" class="text-sm font-medium text-gray-700">Dashboard</a><button id="logout-btn" class="text-sm text-red-600">Logout</button>`;
                document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
            }
        });

        async function fetchFeaturedContent() {
            // ... (your existing fetch logic)
        }
        fetchFeaturedContent();
    </script>
</body>
</html>
