<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs | Daddy Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Daddy Media</a>
            <nav class="nav-links">
                <a href="jobs.html" class="active">Jobs</a>
                <a href="internships.html">Internships</a>
                <a href="community.html">Community</a>
            </nav>
            <div class="auth-buttons" id="auth-container">
                <!-- Auth state managed by JS -->
            </div>
        </div>
    </header>

    <main class="directory-layout container">
        <!-- Sidebar Filters -->
        <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-group">
                <label>Job Type</label>
                <select id="filter-type">
                    <option value="all">All Types</option>
                    <option value="full-time">Full Time</option>
                    <option value="part-time">Part Time</option>
                    <option value="remote">Remote</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Category</label>
                <input type="text" id="filter-category" placeholder="e.g., Engineering, Design">
            </div>
            <button class="btn btn-primary w-100" id="apply-filters">Apply Filters</button>
        </aside>

        <!-- Listings -->
        <section class="listings">
            <div class="listings-header">
                <h1>Explore Opportunities</h1>
                <span id="results-count">Showing results...</span>
            </div>
            <div class="jobs-list" id="jobs-list-container">
                <!-- Dynamically populated by JS -->
                <div class="loader">Loading...</div>
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination-controls">
                <button class="btn btn-outline" id="prev-page" disabled>Previous</button>
                <button class="btn btn-outline" id="next-page">Next</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Daddy Media. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="js/firebase-init.js"></script>
    <script type="module" src="js/jobs.js"></script>
</body>
</html>
