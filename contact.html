<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Support Pipeline | Daddy Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Daddy Media Central Communications</a>
        </div>
    </header>

    <main class="container mt-4" style="max-width: 600px;">
        <div class="card">
            <h1>Initialize Ticket Submission</h1>
            <p class="text-muted">Transmit system logs, administrative platform requests, or bug diagnostics to database metrics.</p>
            
            <form id="contact-submission-form" class="mt-4">
                <div class="filter-group">
                    <label for="c-name">Sender Identity</label>
                    <input type="text" id="c-name" required>
                </div>
                <div class="filter-group mt-2">
                    <label for="c-email">Routing Return Target Vector (Email Address)</label>
                    <input type="email" id="c-email" required>
                </div>
                <div class="filter-group mt-2">
                    <label for="c-payload">System Event Message Text Block</label>
                    <textarea id="c-payload" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-4">Transmit Data Packet</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3w0R0qx8IA2MeAZETBxKBP02IqIVz8",
            authDomain: "daddy-media.firebaseapp.com",
            projectId: "daddy-media",
            storageBucket: "daddy-media.firebasestorage.app",
            messagingSenderId: "13022563374",
            appId: "1:13022563374:web:1123e9bec9d49d192823bf",
            measurementId: "G-LWX8MJ7SW5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('contact-submission-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                // Route input directly into reports data container schema[cite: 1]
                await addDoc(collection(db, "reports"), {
                    senderName: document.getElementById('c-name').value,
                    senderEmail: document.getElementById('c-email').value,
                    message: document.getElementById('c-payload').value,
                    timestamp: new Date()
                });
                alert('Support packet logged successfully inside database records.');
                this.reset();
            } catch(err) {
                alert(`Data drop fault detected: ${err.message}`);
            }
        });
    </script>
</body>
</html>
