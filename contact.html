<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Daddy Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Daddy Media</a>
            <nav class="nav-links">
                <a href="jobs.html">Jobs</a>
                <a href="community.html">Community</a>
            </nav>
        </div>
    </header>

    <main class="container static-page mt-4 form-container">
        <h1>Contact Us</h1>
        <p>Have a question or feedback? We'd love to hear from you.</p>
        
        <form id="contact-form" class="card mt-2">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required class="form-control">
            </div>
            <div class="form-group mt-2">
                <label for="email">Email</label>
                <input type="email" id="email" required class="form-control">
            </div>
            <div class="form-group mt-2">
                <label for="message">Message</label>
                <textarea id="message" rows="5" required class="form-control"></textarea>
            </div>
            <button type="submit" class="btn btn-primary mt-2">Send Message</button>
        </form>
    </main>

    <script>
        document.getElementById('contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thank you for contacting Daddy Media! We will get back to you soon.');
            e.target.reset();
        });
    </script>
</body>
</html>
