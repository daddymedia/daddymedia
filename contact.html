<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Support Pipeline | Daddy Media</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563eb', // Blue-600
                        secondary: '#1e40af', // Blue-800
                        dark: '#111827', // Gray-900
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50 border-b-2 border-primary">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2 text-lg font-bold text-gray-900 hover:text-primary transition">
                    <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Daddy Media <span class="text-primary hidden sm:inline">Central Communications</span>
                </a>
                
                <nav>
                    <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition">&larr; Return to Main Portal</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 w-full">
        <div class="max-w-xl w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-8 sm:p-10">
            
            <div class="mb-8 border-b border-gray-100 pb-6">
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Initialize Ticket Submission</h1>
                <p class="text-gray-500 text-sm leading-relaxed">
                    Transmit system logs, administrative platform requests, or bug diagnostics to database metrics.
                </p>
            </div>
            
            <form id="contact-submission-form" class="space-y-5">
                <div>
                    <label for="c-name" class="block text-sm font-medium text-gray-700 mb-1">Sender Identity</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" id="c-name" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition bg-gray-50 focus:bg-white text-sm">
                    </div>
                </div>
                
                <div>
                    <label for="c-email" class="block text-sm font-medium text-gray-700 mb-1">Routing Return Target Vector <span class="text-gray-400 font-normal">(Email Address)</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                        <input type="email" id="c-email" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition bg-gray-50 focus:bg-white text-sm">
                    </div>
                </div>
                
                <div>
                    <label for="c-payload" class="block text-sm font-medium text-gray-700 mb-1">System Event Message Text Block</label>
                    <textarea id="c-payload" rows="5" required class="block w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition bg-gray-50 focus:bg-white text-sm resize-none"></textarea>
                </div>
                
                <div class="pt-2">
                    <button type="submit" id="submit-btn" class="w-full flex justify-center items-center gap-2 bg-primary hover:bg-secondary text-white font-medium py-3 px-4 rounded-md transition duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        Transmit Data Packet
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-8 text-center text-sm mt-auto">
        <p>&copy; 2026 Daddy Media. Encrypted System Logging Component.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3w0R0qx8IA2MeAZETBxKBP02IqIVz8",
            authDomain: "daddy-media.firebaseapp.com",
            projectId: "daddy-media",
            storageBucket: "daddy-media.firebasestorage.app",
            messagingSenderId: "13022563374",
            appId: "1:13022563374:web:1123e9bec9d49d192823bf",
            measurementId: "G-LWX8MJ7SW5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('contact-submission-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Transmitting...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                // Route input directly into reports data container schema
                await addDoc(collection(db, "reports"), {
                    senderName: document.getElementById('c-name').value,
                    senderEmail: document.getElementById('c-email').value,
                    message: document.getElementById('c-payload').value,
                    timestamp: new Date()
                });
                alert('Support packet logged successfully inside database records.');
                this.reset();
            } catch(err) {
                alert(`Data drop fault detected: ${err.message}`);
            } finally {
                // Restore button state
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
