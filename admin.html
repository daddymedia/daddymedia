<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Input Control Panel | Daddy Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo" style="color:var(--danger)">Daddy Media Core Management Environment</a>
        </div>
    </header>

    <main class="container mt-4" style="max-width:800px;">
        <div class="card" id="admin-gatekeeper-warning">
            <h2>Identity Validation Check Matrix Running</h2>
            <p class="text-muted">Evaluating operational state profiles against system configurations...</p>
        </div>

        <div id="admin-workspace" style="display:none;">
            <h1>Object Injection Framework Engine</h1>
            
            <div class="card mt-4">
                <h2>Inject New Job Profile Record</h2>
                <div class="filter-group mt-2">
                    <label>Position Label</label><input type="text" id="job-title-in">
                </div>
                <div class="filter-group mt-2">
                    <label>Corporate Organization Name</label><input type="text" id="job-company-in">
                </div>
                <div class="filter-group mt-2">
                    <label>Category Space Descriptor</label><input type="text" id="job-cat-in" placeholder="Engineering, Design...">
                </div>
                <div class="filter-group mt-2">
                    <label>Location Topology Node</label><input type="text" id="job-loc-in">
                </div>
                <button class="btn btn-primary mt-4 w-100" id="commit-job-btn">Execute Collection Append Directive</button>
            </div>

            <div class="card mt-4">
                <h2>Inject New Internship Profile Record</h2>
                <div class="filter-group mt-2">
                    <label>Intern Role Title</label><input type="text" id="int-title-in">
                </div>
                <div class="filter-group mt-2">
                    <label>Firm Identifier</label><input type="text" id="int-comp-in">
                </div>
                <div class="filter-group mt-2">
                    <label>Duration Metrics Horizon</label><input type="text" id="int-dur-in" placeholder="e.g. 3 Months">
                </div>
                <div class="filter-group mt-2">
                    <label>Compensation Category Selection</label>
                    <select id="int-stipend-in">
                        <option value="paid">Paid Matrix Target</option>
                        <option value="unpaid">Academic Non-Compensated Loop</option>
                    </select>
                </div>
                <button class="btn btn-primary mt-4 w-100" id="commit-int-btn">Execute Secondary Document Append</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBn3w0R0qx8IA2MeAZETBxKBP02IqIVz8",
            authDomain: "daddy-media.firebaseapp.com",
            projectId: "daddy-media",
            storageBucket: "daddy-media.firebasestorage.app",
            messagingSenderId: "13022563374",
            appId: "1:13022563374:web:1123e9bec9d49d192823bf",
            measurementId: "G-LWX8MJ7SW5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            // Free-tier architectural gatekeeper mapping validation logic[cite: 1]
            if(user && user.email === 'admin@daddymedia.site') {
                document.getElementById('admin-gatekeeper-warning').style.display = 'none';
                document.getElementById('admin-workspace').style.display = 'block';
            } else {
                document.getElementById('admin-gatekeeper-warning').innerHTML = `
                    <h2 class="text-danger">Access Authorization Failure Matrix Triggered</h2>
                    <p>Your validated security account token identity does not match the platform structural root verification schema required for administrative control operations.</p>
                `;
            }
        });

        document.getElementById('commit-job-btn').addEventListener('click', async () => {
            try {
                await addDoc(collection(db, "jobs"), {
                    title: document.getElementById('job-title-in').value,
                    company: document.getElementById('job-company-in').value,
                    category: document.getElementById('job-cat-in').value,
                    location: document.getElementById('job-loc-in').value,
                    timestamp: new Date()
                });
                alert('Job object initialized successfully.');
            } catch(e) {
                alert(`Transaction breakdown encountered: ${e.message}`);
            }
        });

        document.getElementById('commit-int-btn').addEventListener('click', async () => {
            try {
                await addDoc(collection(db, "internships"), {
                    title: document.getElementById('int-title-in').value,
                    company: document.getElementById('int-comp-in').value,
                    duration: document.getElementById('int-dur-in').value,
                    stipend: document.getElementById('int-stipend-in').value,
                    timestamp: new Date()
                });
                alert('Internship vector injected successfully.');
            } catch(e) {
                alert(`Transaction breakdown encountered: ${e.message}`);
            }
        });
    </script>
</body>
</html>
